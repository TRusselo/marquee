services:
  marquee:
    build: .
    image: marquee:local
    container_name: marquee
    network_mode: host
    restart: unless-stopped
    environment:
      HUB_IP: "192.168.1.50"
      PAGE_URL: "http://192.168.1.10:8084/image"
      PLEX_HOST: "http://192.168.1.10:32400"
      PLEX_TOKEN: "replace-me"
      TMDB_API_KEY: ""
    volumes:
      - ./data:/config
