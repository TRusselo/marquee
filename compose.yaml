services:
  marquee:
    build: .
    image: marquee:local
    container_name: marquee
    network_mode: host
    restart: unless-stopped
    environment:
      HUB_IP: ""                                   # optional — pick your Hub in the settings UI instead
      PAGE_URL: "http://192.168.1.10:8084/image"   # this server's LAN IP — the Hub loads this, so localhost won't work
      PLEX_HOST: "http://localhost:32400"          # keep localhost if Plex runs on this machine
      PLEX_TOKEN: "replace-me"
      PLEX_USERS: ""   # comma-separated usernames; empty = everyone
      TMDB_API_KEY: ""
      # --- Media backend: choose one ---
      MEDIA_BACKEND: "plex"                        # plex (default) | emby
      EMBY_HOST: ""                                # e.g. http://localhost:8096 (when emby)
      EMBY_API_KEY: ""                             # Emby API key (when emby)
      # --- Display target: choose one ---
      CAST_TARGET: "nest"                          # nest (default) | esp32
      ESP32_HOST: ""                               # ESP32 IP (when esp32)
      ESP32_PORT: "80"                             # ESP32 HTTP port
    volumes:
      - ./data:/config
